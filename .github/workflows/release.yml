name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            libfreetype6-dev libpcre2-dev \
            libx11-dev libxext-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxrandr-dev libxss-dev libxtst-dev \
            libxxf86vm-dev libxfixes-dev libxrender-dev \
            libdbus-1-dev libudev-dev \
            libpulse-dev libasound2-dev \
            libdrm-dev libgbm-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols
          git clone --depth 1 https://github.com/libsdl-org/SDL.git
          cmake -S SDL -B SDL/build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build SDL/build
          sudo cmake --install SDL/build

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir lite-anvil-linux-x86_64
          cp target/release/lite-anvil lite-anvil-linux-x86_64/
          cp -r data lite-anvil-linux-x86_64/
          tar -czf lite-anvil-linux-x86_64.tar.gz lite-anvil-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lite-anvil-linux-x86_64
          path: lite-anvil-linux-x86_64.tar.gz

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          choco install pkgconfiglite -y
          vcpkg install sdl3:x64-windows freetype:x64-windows pcre2:x64-windows
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=C:\vcpkg\installed\x64-windows\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          New-Item -ItemType Directory -Name lite-anvil-windows-x86_64
          Copy-Item target\release\lite-anvil.exe lite-anvil-windows-x86_64\
          Copy-Item -Recurse data lite-anvil-windows-x86_64\
          Compress-Archive -Path lite-anvil-windows-x86_64 -DestinationPath lite-anvil-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lite-anvil-windows-x86_64
          path: lite-anvil-windows-x86_64.zip

  build-macos-intel:
    name: macOS Intel (x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build x86_64 system dependencies from source
        # No x86_64 Homebrew on ARM runners — build everything for x86_64 via cmake.
        run: |
          PREFIX=/tmp/deps-x86
          COMMON="-DCMAKE_BUILD_TYPE=Release -G Ninja -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0"

          git clone --depth 1 https://github.com/libsdl-org/SDL.git
          cmake -S SDL -B SDL/build $COMMON \
            -DSDL_SHARED=OFF -DSDL_STATIC=ON \
            -DSDL_JOYSTICK=OFF -DSDL_HAPTIC=OFF -DSDL_SENSOR=OFF \
            -DSDL_CAMERA=OFF
          cmake --build SDL/build
          cmake --install SDL/build

          git clone --depth 1 https://github.com/freetype/freetype.git
          cmake -S freetype -B freetype/build $COMMON \
            -DFT_DISABLE_HARFBUZZ=ON -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_BROTLI=ON -DFT_DISABLE_PNG=ON
          cmake --build freetype/build
          cmake --install freetype/build

          git clone --depth 1 https://github.com/PCRE2Project/pcre2.git
          cmake -S pcre2 -B pcre2/build $COMMON \
            -DPCRE2_BUILD_PCRE2_8=ON -DPCRE2_BUILD_PCRE2_16=OFF \
            -DPCRE2_BUILD_PCRE2_32=OFF -DPCRE2_BUILD_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build pcre2/build
          cmake --install pcre2/build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        env:
          PKG_CONFIG_PATH: /tmp/deps-x86/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: "1"
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          # ___isPlatformVersionAtLeast lives in libclang_rt.osx.a, which Rust's
          # -nodefaultlibs drops. Find it for the x86_64 slice and pass it directly.
          CLANG_RT=$(clang -arch x86_64 -print-file-name=libclang_rt.osx.a)
          export RUSTFLAGS="-C link-arg=$CLANG_RT \
            -C link-arg=-framework -C link-arg=UniformTypeIdentifiers"
          cargo build --release --target x86_64-apple-darwin

      - name: Create .app bundle
        run: |
          set -euo pipefail

          macos_list_deps() {
            otool -L "$1" | tail -n +2 | awk '{print $1}'
          }

          macos_should_bundle_dep() {
            case "$1" in
              /System/Library/*|/usr/lib/*|@executable_path/*|@loader_path/*)
                return 1
                ;;
              /*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          macos_resolve_dep() {
            local dep="$1"
            local dep_name candidate
            local matches=()

            if [ -f "$dep" ]; then
              printf '%s\n' "$dep"
              return 0
            fi

            dep_name="$(basename "$dep")"

            shopt -s nullglob
            for candidate in $dep; do
              [ -f "$candidate" ] && matches+=("$candidate")
            done

            if [ "${#matches[@]}" -gt 0 ]; then
              printf '%s\n' "${matches[0]}"
              shopt -u nullglob
              return 0
            fi

            for candidate in \
              "/opt/homebrew/lib/$dep_name" \
              /opt/homebrew/opt/*/lib/"$dep_name" \
              "/usr/local/lib/$dep_name" \
              /usr/local/opt/*/lib/"$dep_name" \
              "/tmp/deps-x86/lib/$dep_name"
            do
              if [ -f "$candidate" ]; then
                printf '%s\n' "$candidate"
                shopt -u nullglob
                return 0
              fi
            done
            shopt -u nullglob

            return 1
          }

          bundle_macos_dylibs() {
            local app="$1"
            local binary="$app/Contents/MacOS/lite-anvil"
            local frameworks_dir="$app/Contents/Frameworks"
            local processed_list="$frameworks_dir/.bundled-dylibs"
            local queued_list="$frameworks_dir/.bundled-queue"

            mkdir -p "$frameworks_dir"
            : > "$processed_list"
            : > "$queued_list"

            bundle_macos_binary_deps() {
              local target="$1"
              local dep
              while IFS= read -r dep; do
                macos_should_bundle_dep "$dep" || continue
                bundle_macos_dep "$target" "$dep"
              done < <(macos_list_deps "$target")
            }

            bundle_macos_dep() {
              local target="$1"
              local source_dep="$2"
              local resolved_dep dep_name dest_dep

              resolved_dep="$(macos_resolve_dep "$source_dep")"
              dep_name="$(basename "$resolved_dep")"
              dest_dep="$frameworks_dir/$dep_name"

              install_name_tool -change "$source_dep" "@executable_path/../Frameworks/$dep_name" "$target"

              if ! grep -Fxq "$resolved_dep" "$processed_list"; then
                printf '%s\n' "$resolved_dep" >> "$processed_list"
                cp -Lf "$resolved_dep" "$dest_dep"
                chmod 755 "$dest_dep"
                install_name_tool -id "@loader_path/$dep_name" "$dest_dep"
                printf '%s\n' "$dest_dep" >> "$queued_list"
              fi
            }

            bundle_macos_binary_deps "$binary"

            local queue_index=1
            local queued_dep
            while queued_dep="$(sed -n "${queue_index}p" "$queued_list")" && [ -n "$queued_dep" ]; do
              local nested_dep nested_name resolved_nested_dep
              while IFS= read -r nested_dep; do
                macos_should_bundle_dep "$nested_dep" || continue
                resolved_nested_dep="$(macos_resolve_dep "$nested_dep")"
                nested_name="$(basename "$resolved_nested_dep")"

                install_name_tool -change "$nested_dep" "@loader_path/$nested_name" "$queued_dep"

                if ! grep -Fxq "$resolved_nested_dep" "$processed_list"; then
                  printf '%s\n' "$resolved_nested_dep" >> "$processed_list"
                  cp -Lf "$resolved_nested_dep" "$frameworks_dir/$nested_name"
                  chmod 755 "$frameworks_dir/$nested_name"
                  install_name_tool -id "@loader_path/$nested_name" "$frameworks_dir/$nested_name"
                  printf '%s\n' "$frameworks_dir/$nested_name" >> "$queued_list"
                fi
              done < <(macos_list_deps "$queued_dep")
              queue_index=$((queue_index + 1))
            done

            rm -f "$processed_list" "$queued_list"
          }

          rm -rf LiteAnvil.app
          mkdir -p LiteAnvil.app/Contents/MacOS LiteAnvil.app/Contents/Frameworks
          cp target/x86_64-apple-darwin/release/lite-anvil LiteAnvil.app/Contents/MacOS/
          cp -r data LiteAnvil.app/Contents/MacOS/
          bundle_macos_dylibs LiteAnvil.app
          cat > LiteAnvil.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>LiteAnvil</string>
              <key>CFBundleDisplayName</key>
              <string>Lite-Anvil</string>
              <key>CFBundleIdentifier</key>
              <string>com.lite_anvil.LiteAnvil</string>
              <key>CFBundleVersion</key>
              <string>0.2.5</string>
              <key>CFBundleExecutable</key>
              <string>lite-anvil</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST
          otool -L LiteAnvil.app/Contents/MacOS/lite-anvil
          zip -r lite-anvil-macos-x86_64.zip LiteAnvil.app

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lite-anvil-macos-x86_64
          path: lite-anvil-macos-x86_64.zip

  build-macos-arm:
    name: macOS Apple Silicon (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: brew install sdl3 freetype pcre2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create .app bundle
        run: |
          set -euo pipefail

          macos_list_deps() {
            otool -L "$1" | tail -n +2 | awk '{print $1}'
          }

          macos_should_bundle_dep() {
            case "$1" in
              /System/Library/*|/usr/lib/*|@executable_path/*|@loader_path/*)
                return 1
                ;;
              /*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          macos_resolve_dep() {
            local dep="$1"
            local dep_name candidate
            local matches=()

            if [ -f "$dep" ]; then
              printf '%s\n' "$dep"
              return 0
            fi

            dep_name="$(basename "$dep")"

            shopt -s nullglob
            for candidate in $dep; do
              [ -f "$candidate" ] && matches+=("$candidate")
            done

            if [ "${#matches[@]}" -gt 0 ]; then
              printf '%s\n' "${matches[0]}"
              shopt -u nullglob
              return 0
            fi

            for candidate in \
              "/opt/homebrew/lib/$dep_name" \
              /opt/homebrew/opt/*/lib/"$dep_name" \
              "/usr/local/lib/$dep_name" \
              /usr/local/opt/*/lib/"$dep_name"
            do
              if [ -f "$candidate" ]; then
                printf '%s\n' "$candidate"
                shopt -u nullglob
                return 0
              fi
            done
            shopt -u nullglob

            return 1
          }

          bundle_macos_dylibs() {
            local app="$1"
            local binary="$app/Contents/MacOS/lite-anvil"
            local frameworks_dir="$app/Contents/Frameworks"
            local processed_list="$frameworks_dir/.bundled-dylibs"
            local queued_list="$frameworks_dir/.bundled-queue"

            mkdir -p "$frameworks_dir"
            : > "$processed_list"
            : > "$queued_list"

            bundle_macos_binary_deps() {
              local target="$1"
              local dep
              while IFS= read -r dep; do
                macos_should_bundle_dep "$dep" || continue
                bundle_macos_dep "$target" "$dep"
              done < <(macos_list_deps "$target")
            }

            bundle_macos_dep() {
              local target="$1"
              local source_dep="$2"
              local resolved_dep dep_name dest_dep

              resolved_dep="$(macos_resolve_dep "$source_dep")"
              dep_name="$(basename "$resolved_dep")"
              dest_dep="$frameworks_dir/$dep_name"

              install_name_tool -change "$source_dep" "@executable_path/../Frameworks/$dep_name" "$target"

              if ! grep -Fxq "$resolved_dep" "$processed_list"; then
                printf '%s\n' "$resolved_dep" >> "$processed_list"
                cp -Lf "$resolved_dep" "$dest_dep"
                chmod 755 "$dest_dep"
                install_name_tool -id "@loader_path/$dep_name" "$dest_dep"
                printf '%s\n' "$dest_dep" >> "$queued_list"
              fi
            }

            bundle_macos_binary_deps "$binary"

            local queue_index=1
            local queued_dep
            while queued_dep="$(sed -n "${queue_index}p" "$queued_list")" && [ -n "$queued_dep" ]; do
              local nested_dep nested_name resolved_nested_dep
              while IFS= read -r nested_dep; do
                macos_should_bundle_dep "$nested_dep" || continue
                resolved_nested_dep="$(macos_resolve_dep "$nested_dep")"
                nested_name="$(basename "$resolved_nested_dep")"

                install_name_tool -change "$nested_dep" "@loader_path/$nested_name" "$queued_dep"

                if ! grep -Fxq "$resolved_nested_dep" "$processed_list"; then
                  printf '%s\n' "$resolved_nested_dep" >> "$processed_list"
                  cp -Lf "$resolved_nested_dep" "$frameworks_dir/$nested_name"
                  chmod 755 "$frameworks_dir/$nested_name"
                  install_name_tool -id "@loader_path/$nested_name" "$frameworks_dir/$nested_name"
                  printf '%s\n' "$frameworks_dir/$nested_name" >> "$queued_list"
                fi
              done < <(macos_list_deps "$queued_dep")
              queue_index=$((queue_index + 1))
            done

            rm -f "$processed_list" "$queued_list"
          }

          rm -rf LiteAnvil.app
          mkdir -p LiteAnvil.app/Contents/MacOS LiteAnvil.app/Contents/Frameworks
          cp target/aarch64-apple-darwin/release/lite-anvil LiteAnvil.app/Contents/MacOS/
          cp -r data LiteAnvil.app/Contents/MacOS/
          bundle_macos_dylibs LiteAnvil.app
          cat > LiteAnvil.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>LiteAnvil</string>
              <key>CFBundleDisplayName</key>
              <string>Lite-Anvil</string>
              <key>CFBundleIdentifier</key>
              <string>com.lite_anvil.LiteAnvil</string>
              <key>CFBundleVersion</key>
              <string>0.2.5</string>
              <key>CFBundleExecutable</key>
              <string>lite-anvil</string>
              <key>CFBundlePackageType</key>
