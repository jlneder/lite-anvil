          otool -L LiteAnvil.app/Contents/MacOS/lite-anvil
          zip -r lite-anvil-macos-aarch64.zip LiteAnvil.app

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lite-anvil-macos-aarch64
          path: lite-anvil-macos-aarch64.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mv artifacts/lite-anvil-linux-x86_64/lite-anvil-linux-x86_64.tar.gz artifacts/
          mv artifacts/lite-anvil-windows-x86_64/lite-anvil-windows-x86_64.zip artifacts/
          mv artifacts/lite-anvil-macos-x86_64/lite-anvil-macos-x86_64.zip artifacts/
          mv artifacts/lite-anvil-macos-aarch64/lite-anvil-macos-aarch64.zip artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
