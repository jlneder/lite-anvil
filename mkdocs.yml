site_name: Lite Anvil
site_url: https://danpozmanter.github.io/lite-anvil/
site_description: A code editor built in Rust with SDL3. Built-in LSP, terminal, Git integration, and 50+ syntax grammars.
site_author: Dan Pozmanter
repo_url: https://github.com/danpozmanter/lite-anvil
repo_name: danpozmanter/lite-anvil
edit_uri: ""

docs_dir: docs_src
site_dir: docs
exclude_docs: |
  _overrides/

theme:
  name: material
  custom_dir: docs_src/_overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - content.code.copy
    - toc.integrate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Screenshots: screenshots.md
  - Installation: installation.md
  - User Guide: guide.md
  - About: about.md

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/danpozmanter/lite-anvil
